name: Sync to R2

on:
  workflow_call:
    inputs:
      tenant_id:
        description: Tenant identifier (defaults to repo name)
        required: false
        type: string
    secrets:
      R2_ACCESS_KEY_ID:
        required: true
      R2_SECRET_ACCESS_KEY:
        required: true
      R2_ENDPOINT:
        required: true

env:
  TENANT_ID: ${{ inputs.tenant_id || github.event.repository.name }}

jobs:
  sync:
    name: Sync changed content to R2
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true
          fetch-depth: 2

      - name: Detect changed files
        id: changes
        run: |
          # Get changed files in modules/, courses/, and widgets/
          CHANGED=$(git diff --name-only HEAD~1 HEAD -- modules/ courses/ widgets/ 2>/dev/null || echo "")
          if [ -z "$CHANGED" ]; then
            echo "No content files changed"
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          else
            echo "Changed files:"
            echo "$CHANGED"
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
            echo "$CHANGED" > /tmp/changed-files.txt
          fi

      - name: Install rclone
        if: steps.changes.outputs.has_changes == 'true'
        run: curl -fsSL https://rclone.org/install.sh | sudo bash

      - name: Configure rclone for R2
        if: steps.changes.outputs.has_changes == 'true'
        env:
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
        run: |
          mkdir -p ~/.config/rclone
          cat > ~/.config/rclone/rclone.conf <<EOF
          [r2]
          type = s3
          provider = Cloudflare
          access_key_id = ${R2_ACCESS_KEY_ID}
          secret_access_key = ${R2_SECRET_ACCESS_KEY}
          endpoint = ${R2_ENDPOINT}
          no_check_bucket = true
          EOF
          sed -i 's/^          //' ~/.config/rclone/rclone.conf

      - name: Upload changed files to R2
        if: steps.changes.outputs.has_changes == 'true'
        run: |
          # Filter to only files that exist (skip deletes)
          > /tmp/upload-files.txt
          while IFS= read -r file; do
            if [ -f "$file" ]; then
              echo "$file" >> /tmp/upload-files.txt
            else
              echo "Skipping deleted file: ${file}"
            fi
          done < /tmp/changed-files.txt

          FILE_COUNT=$(wc -l < /tmp/upload-files.txt | tr -d ' ')
          echo "Uploading ${FILE_COUNT} files to R2 (8 parallel transfers)..."
          cat /tmp/upload-files.txt

          # Upload all changed files in parallel using --files-from
          # Maps: modules/foo/bar.md → tenants/{TENANT_ID}/modules/foo/bar.md
          rclone copy . "r2:course-viewer-content/tenants/${TENANT_ID}" \
            --files-from /tmp/upload-files.txt \
            --transfers 8 \
            --verbose \
            --stats-one-line
          echo "Sync complete"
